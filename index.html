<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الاختبار الشامل المطور - الصف السابع</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2e59d9; 
            --secondary: #4e73df; 
            --success: #1cc88a;
            --error: #e74a3b; 
            --warning: #f6c23e; 
            --light: #f8f9fc;
            --dark-blue: #1e3a8a;
        }
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: linear-gradient(120deg, #e0e8f5 0%, #f5f7fa 100%); 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
        }
        .quiz-container { 
            width: 100%; 
            max-width: 900px; 
            background: white; 
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(46, 89, 217, 0.15); 
            overflow: hidden; 
            border: 1px solid rgba(227, 230, 240, 0.8);
        }
        .header { 
            background: linear-gradient(135deg, var(--dark-blue), var(--primary)); 
            color: white; 
            padding: 30px 20px; 
            text-align: center; 
            border-bottom: 6px solid var(--warning); 
            position: relative;
        }
        .header h1 { margin: 0; font-size: 1.8rem; font-weight: 700; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
        .header p { margin: 10px 0 0; font-size: 1.1rem; opacity: 0.9; }
        
        .stats-bar { 
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            padding: 15px; 
            background: #f4f6fc; 
            font-weight: 700; 
            font-size: 1rem; 
            border-bottom: 2px solid #e3e6f0;
            color: #4e5e80;
        }
        .stat-item { display: flex; align-items: center; gap: 6px; background: white; padding: 6px 16px; border-radius: 50px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .content-area { padding: 30px; }
        .reading-text { 
            background: #fffcf0; 
            border-right: 6px solid var(--warning); 
            padding: 22px; 
            border-radius: 14px; 
            margin-bottom: 25px; 
            font-size: 1.15rem; 
            line-height: 1.9; 
            color: #2b2d42; 
            white-space: pre-line;
            box-shadow: inset 0 0 10px rgba(246, 194, 62, 0.05);
        }
        .question-box { font-size: 1.35rem; font-weight: 700; color: var(--dark-blue); margin-bottom: 22px; display: flex; align-items: flex-start; gap: 8px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        
        .option-btn { 
            background: white; 
            border: 2px solid #e3e6f0; 
            padding: 20px; 
            border-radius: 16px; 
            cursor: pointer; 
            transition: all 0.25s ease; 
            font-size: 1.1rem; 
            font-family: 'Tajawal'; 
            font-weight: 500; 
            color: #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            text-align: right;
        }
        .option-btn:hover { 
            border-color: var(--secondary); 
            background: #f0f4ff; 
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(78, 115, 223, 0.1);
        }
        .option-btn.correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; font-weight: 700; }
        .option-btn.wrong { background: var(--error) !important; color: white !important; border-color: var(--error) !important; font-weight: 700; }
        
        .feedback { 
            margin-top: 20px; 
            padding: 18px; 
            border-radius: 12px; 
            display: none; 
            font-weight: 600; 
            font-size: 1.05rem;
            line-height: 1.6;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .footer { padding: 20px 30px; text-align: left; border-top: 2px solid #f0f2f5; background: #fafbfe; }
        
        .btn-next { 
            background: linear-gradient(135deg, var(--secondary), var(--primary)); 
            color: white; 
            border: none; 
            padding: 14px 40px; 
            border-radius: 50px; 
            cursor: pointer; 
            display: none; 
            font-family: 'Tajawal'; 
            font-weight: 700; 
            font-size: 1.1rem;
            box-shadow: 0 5px 15px rgba(78, 115, 223, 0.3);
            transition: all 0.2s;
        }
        .btn-next:hover { transform: scale(1.03); box-shadow: 0 7px 18px rgba(78, 115, 223, 0.4); }
        
        .result-screen { text-align: center; padding: 60px 30px; display: none; }
        .score-circle { 
            width: 160px; 
            height: 160px; 
            border-radius: 50%; 
            background: linear-gradient(135deg, var(--primary), var(--dark-blue)); 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 3.2rem; 
            margin: 0 auto 25px; 
            font-weight: 700; 
            box-shadow: 0 10px 25px rgba(46, 89, 217, 0.4);
            border: 5px solid var(--warning);
        }
        .timer-warning { color: var(--error) !important; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } .header h1 { font-size: 1.5rem; } }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header">
        <h1>🏫 مدرسة يزيد بن الحارث - الاختبار الشامل المطور</h1>
        <p>📝 50 سؤالاً متنوعاً باختيارات تفاعلية عشوائية - الصف السابع</p>
    </div>

    <div class="stats-bar">
        <div class="stat-item">📋 <span style="margin-right:5px;">السؤال: </span> <span id="qCurrent">1</span> / 50</div>
        <div class="stat-item">⭐ <span style="margin-right:5px;">الدرجة: </span> <span id="score">0</span></div>
        <div class="stat-item" id="timerContainer">⏱️ <span style="margin-right:5px;">المتبقي: </span> <span id="timer">40</span> ث</div>
    </div>

    <div id="quizBody" class="content-area"></div>

    <div class="footer">
        <button id="nextBtn" class="btn-next" onclick="loadNextQuestion()">السؤال التالي ⬅️</button>
    </div>

    <div id="resultPage" class="result-screen">
        <div class="score-circle" id="finalScore">0</div>
        <h2 style="color: var(--dark-blue); font-size: 2rem;">🎉 تم إنهاء الاختبار بنجاح! 🎉</h2>
        <p style="font-size: 1.2rem; color: #555; margin-bottom: 30px;">لقد راجعت كافة مهارات الاختبار القصير الثاني بكفاءة وتميز.</p>
        <button class="btn-next" style="display:inline-block" onclick="location.reload()">إعادة التحدي 🔄</button>
    </div>
</div>

<script>
// الروابط الصوتية المدمجة ذاتياً مجاناً ومباشرة العمل
const audioCorrect = new Audio('https://assets.mixkit.co/active_storage/sfx/2018/2018-84.wav'); // صوت نجاح وتصفيق تشجيعي قصير
const audioWrong = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-84.wav'); // صوت خطأ وتنبيه هادئ
const audioTick = new Audio('https://assets.mixkit.co/active_storage/sfx/2547/2547-84.wav'); // دقات وقت
const audioFinal = new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-84.wav'); // صوت فوز جماعي للمستويات النهائية

const textNusus = `📖 نص (السلحفاة والبطتان):
1 - ثم قضى المهيمن القدير .. أن ينشف النبات والغدير
2 - فساء فقد الماء السلحفاة .. فبدلت بنعمة بأساء
3 - وقالتا: لا تحزني يا صاحبة .. إن الوفي ليس ينسى صاحبه
4 - الماء في واد قريب من هنا .. نمشي إليه بالسرور والهنا
5 - فقالتا: نحمل في كتفينا .. عوداً متيناً يابساً أو لينا`;

const textNahw = `✍️ فقرة النحو (قصة غاندي):
يُحكى أنّ المهاتما غاندي كان يركض بسرعة رغبة في اللحاق بالقطار، والذي كان قد بدأ بالتحرك صباحاً، ولكن إحدى فردتي حذائه سقطت أثناء صعوده على متن القطار، فخلع فردة حذائه الثانية، ورماها قريباً من الفردة الأولى. فقال غاندي لأخيه الإنسان: "أردتُ للفقير الذي يجد الحذاء أن يجد الفردتين كي يكون قادراً على استخدامهما، فهو لن يستفيد إن وجد فردةً واحدةً ، كما أنّني لن أستفيد منها أيضاً".`;

const textImla = `✏️ فقرة الإملاء والتلقين:
مر رجل بآخر يحفر في الصحراء، فقال له: "ما بك أيها الرجل، ولماذا تحفر؟" قال: "إنّي دفنت في هذه الصحراء بعضاً من المال، ولست أهتدي إلى مكانه". فقال له: "كان يجب أن تجعل عليه علامة". قال: "قد فعلت". قال: "وما هي العلامة؟" قال: "غيمة في السماء كانت تظلها، ولست أرى العلامة الآن".`;

const questions = [
    // النصوص (1-17)
    { t: textNusus, q: "استخرج من الأبيات كلمة معناها (يجف):", o: ["ينشف", "قضى", "ساء", "بدلت"], corrText: "ينشف", f: "💡 الإجابة الصحيحة: كلمة ينشف تعني يجف كما ورد في البيت الأول." },
    { t: textNusus, q: "نوع الأسلوب في قول الشاعر (لا تحزني):", o: ["نهي", "أمر", "نداء", "نفي"], corrText: "نهي", f: "💡 الإجابة الصحيحة: هذا أسلوب نهي يفيد الكف عن الحزن واليأس." },
    { t: textNusus, q: "البيت الذي يمثل معنى 'الصديق الوفي لا يتخلى عن صاحبه':", o: ["البيت الثالث", "البيت الأول", "البيت الثاني", "البيت الرابع"], corrText: "البيت الثالث", f: "💡 الإجابة الصحيحة: البيت الثالث يوضح أن الوفي لا ينسى صاحبه أبدًا." },
    { t: textNusus, q: "ما ضد كلمة (يابساً) الواردة في البيت الخامس؟", o: ["ليناً", "متيناً", "عوداً", "كتفينا"], corrText: "ليناً", f: "💡 الإجابة الصحيحة: اللين هو ضد اليبوسة والجفاف." },
    { t: textNusus, q: "كلمة معناها ( المسيطر ) في البيت الأول:", o: ["المهيمن", "القدير", "النبات", "الغدير"], corrText: "المهيمن", f: "💡 الإجابة الصحيحة: المهيمن تعني المسيطر والرقيب والحافظ وهو من أسماء الله الحسنى." },
    { t: textNusus, q: "ما سبب حزن السلحفاة كما يفهم من البيت الثاني؟", o: ["جفاف الماء", "فقد الغدير", "تغير النعمة إلى بأساء", "كل ما سبق"], corrText: "كل ما سبق", f: "💡 الإجابة الصحيحة: كل هذه الأسباب المجتمعة أدت لسوء حال السلحفاة وحزنها." },
    { t: textNusus, q: "كيف وصفت البطتان الوادي الجديد في البيت الرابع؟", o: ["بالقريب", "بالبعيد", "بالكبير", "بالعميق"], corrText: "بالقريب", f: "💡 الإجابة الصحيحة: وصفتاه بأنه 'وادٍ قريب' كبشارة أمل لها." },
    { t: textNusus, q: "ما هي الأداة التي ستستخدم لنقل السلحفاة؟", o: ["عود متين", "جناح البطتان", "سلة كبيرة", "حبل قوي"], corrText: "عود متين", f: "💡 الإجابة الصحيحة: اقترحت البطتان حمل 'عود متين' لتقبض عليه بفمها." },
    { t: textNusus, q: "كلمة (الهنا) في البيت الرابع مرادفها:", o: ["الفرح والسرور", "التعب", "الخوف", "الحزن"], corrText: "الفرح والسرور", f: "💡 الإجابة الصحيحة: الهنا تعني السعادة وراحة البال والسرور." },
    { t: textNusus, q: "الشعور السائد في البيت الرابع هو:", o: ["التفاؤل والسرور", "اليأس", "الغضب", "الدهشة"], corrText: "التفاؤل والسرور", f: "💡 الإجابة الصحيحة: يدل البيت على مشاعر التفاؤل والسرور والهنا المتبادل." },
    { t: textNusus, q: "معنى كلمة (قضى) في البيت الأول:", o: ["حكم وأمر", "انتهى", "مات", "ذهب"], corrText: "حكم وأمر", f: "💡 الإجابة الصحيحة: قضى هنا بمعنى حكم الله وقدره النافذ." },
    { t: textNusus, q: "ما العلاقة بين (نعمة) و (بأساء)؟", o: ["تضاد", "ترادف", "تكامل", "تشابه"], corrText: "تضاد", f: "💡 الإجابة الصحيحة: النعمة ضدها البأساء والشدة، فالعلاقة تضاد توضح المعنى." },
    { t: textNusus, q: "لماذا وصفت البطتان العود بأنه (متين)؟", o: ["ليتحمل وزن السلحفاة", "لأنه لين", "لأنه طويل", "لأنه جميل"], corrText: "ليتحمل وزن السلحفاة", f: "💡 الإجابة الصحيحة: المتانة ضرورية وقوة العود مطلوبة لتحمل وزن السلحفاة أثناء الطيران." },
    { t: textNusus, q: "نوع الأسلوب في قول الشاعر ( يا صاحبة ):", o: ["نداء", "أمر", "نهي", "تعجب"], corrText: "نداء", f: "💡 الإجابة الصحيحة: الأسلوب هو أسلوب نداء غرضه التودد والتحبب للصاحب." },
    { t: textNusus, q: "الفعل (نمشي) في البيت الرابع يدل على:", o: ["الحركة والاستمرار", "السكون", "الماضي", "التوقف"], corrText: "الحركة والاستمرار", f: "💡 الإجابة الصحيحة: الفعل المضارع يفيد دائماً التجدد والاستمرار والحركة." },
    { t: textNusus, q: "الغرض من نص (السلحفاة والبطتان) هو الحث على:", o: ["الوفاء والتعاون", "الكسل", "الخداع", "الوحدة"], corrText: "الوفاء والتعاون", f: "💡 الإجابة الصحيحة: النص يبرز بشكل أساسي قيم وفاء الأصدقاء والتعاون وقت الشدائد." },
    { t: textNusus, q: "كلمة (فبدلت) تدل على:", o: ["التغير المفاجئ", "الثبات", "الهدوء", "الانتظار"], corrText: "التغير المفاجئ", f: "💡 الإجابة الصحيحة: الفاء عاطفة وتدل على تحول وتغير الحال السريع من النعمة للبأساء." },

    // النحو (18-35)
    { t: textNahw, q: "استخرج (مفعولاً فيه) ظرف زمان:", o: ["صباحاً", "بسرعة", "رغبة", "القطار"], corrText: "صباحاً", f: "💡 الإجابة الصحيحة: صباحاً ظرف زمان يبين وقت حدوث الفعل." },
    { t: textNahw, q: "استخرج اسماً من الأسماء الخمسة:", o: ["أخيه", "غاندي", "الإنسان", "الفردتين"], corrText: "أخيه", f: "💡 الإجابة الصحيحة: أخيه اسم من الأسماء الخمسة وهو مضاف." },
    { t: textNahw, q: "إعراب (يركض) في 'كان يركض':", o: ["فعل مضارع مرفوع", "فعل ماضٍ", "اسم كان", "خبر كان منصوب"], corrText: "فعل مضارع مرفوع", f: "💡 الإجابة الصحيحة: فعل مضارع مرفوع بالضمة، والجملة الفعلية في محل نصب خبر كان." },
    { t: textNahw, q: "لماذا (الآباء) ليست من الأسماء الخمسة؟", o: ["لأنها جمع", "لأنها مفرد", "لأنها مضافة", "لأنها مثنى"], corrText: "لأنها جمع", f: "💡 الإجابة الصحيحة: شرط الأسماء الخمسة لتعرب بالحروف أن تكون مفردة وليست جمعاً." },
    { t: textNahw, q: "صوب الخطأ: 'جاء ذا الوجهين':", o: ["ذو", "ذي", "ذوا", "ذوو"], corrText: "ذو", f: "💡 الإجابة الصحيحة: ذو هي الصواب لأن موقعه الإعرابي فاعل مرفوع وعلامة رفعه الواو." },
    { t: textNahw, q: "ما علامة جر الأسماء الخمسة؟", o: ["الياء", "الكسرة", "الألف", "الفتحة"], corrText: "الياء", f: "💡 الإجابة الصحيحة: تجر الأسماء الخمسة بالياء نيابة عن الكسرة." },
    { t: textNahw, q: "أي الجمل التالية تحتوي على اسم من الأسماء الخمسة؟", o: ["قابلت أباك", "قابلت أبي", "جاء الإخوة", "هذان أبوان"], corrText: "قابلت أباك", f: "💡 الإجابة الصحيحة: أباك توفرت فيها الشروط (مفردة ومضافة لغير ياء المتكلم)." },
    { t: textNahw, q: "إعراب كلمة (أخيه) في الفقرة:", o: ["اسم مجرور بالياء", "اسم مجرور بالكسرة", "مضاف إليه", "نعت"], corrText: "اسم مجرور بالياء", f: "💡 الإجابة الصحيحة: اسم مجرور باللام وعلامة جره الياء لأنه من الأسماء الخمسة." },
    { t: textNahw, q: "المفعول فيه المذكور في 'سقطت أثناء صعوده' هو:", o: ["أثناء", "سقطت", "صعوده", "القطار"], corrText: "أثناء", f: "💡 الإجابة الصحيحة: أثناء تدل على ظرف زمان المبني على المضاف بعده." },
    { t: textNahw, q: "كلمة (الفردتين) تعرب مفعولاً به منصوباً بـ:", o: ["الياء", "الألف", "الفتحة", "الكسرة"], corrText: "الياء", f: "💡 الإجابة الصحيحة: مفعول به منصوب بالياء لأنه مثنى." },
    { t: textNahw, q: "الفعل (يجد) مسبوق بـ (أن) الناصبة، فيعرب:", o: ["فعل مضارع منصوب", "فعل مضارع مرفوع", "فعل مضارع مجزوم", "فعل أمر"], corrText: "فعل مضارع منصوب", f: "💡 الإجابة الصحيحة: فعل مضارع منصوب بالفتحة الظاهرة بعد أداة النصب أن." },
    { t: textNahw, q: "ما الموقع الإعرابي لـ (غاندي) في 'فقال غاندي'؟", o: ["فاعل", "مفعول به", "مبتدأ", "مضاف إليه"], corrText: "فاعل", f: "💡 الإجابة الصحيحة: غاندي فاعل مرفوع بالضمة المقدرة لأنه من قام بالفعل." },

let currentQ = 0;
let score = 0;
let timer;
let currentOptions = []; 
let correctAnswerIndex = 0; 

function shuffleArray(array) {
    let shuffled = [...array];
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
}

function loadQuestion() {
    const q = questions[currentQ];
    const quizBody = document.getElementById('quizBody');
    document.getElementById('qCurrent').innerText = currentQ + 1;
    document.getElementById('nextBtn').style.display = 'none';
    document.getElementById('timerContainer').classList.remove('timer-warning');
    
    currentOptions = shuffleArray(q.o);
    correctAnswerIndex = currentOptions.indexOf(q.corrText);
    
    quizBody.innerHTML = `
        <div class="reading-text">${q.t}</div>
        <div class="question-box">❓ ${q.q}</div>
        <div class="options-grid">
            ${currentOptions.map((opt, i) => `<button class="option-btn" onclick="checkAnswer(this, ${i})">🔹 ${opt}</button>`).join('')}
        </div>
        <div id="feedback" class="feedback"></div>
    `;
    startTimer();
}

function startTimer() {
    let timeLeft = 40;
    document.getElementById('timer').innerText = timeLeft;
    clearInterval(timer);
    timer = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = timeLeft;
        
        if (timeLeft <= 10) {
            document.getElementById('timerContainer').classList.add('timer-warning');
            try { audioTick.play(); } catch(e) {} // تشغيل صوت التنبيه اللحظي للوقت
        }
        
        if(timeLeft <= 0) {
            clearInterval(timer);
            try { audioWrong.play(); } catch(e) {}
            loadNextQuestion();
        }
    }, 1000);
}

function checkAnswer(btn, idx) {
    clearInterval(timer);
    const q = questions[currentQ];
    const feedback = document.getElementById('feedback');
    const buttons = document.querySelectorAll('.option-btn');
    
    buttons.forEach(b => b.style.pointerEvents = 'none');
    feedback.style.display = 'block';
    feedback.innerText = q.f;

    if(idx === correctAnswerIndex) {
        btn.classList.add('correct');
        btn.innerHTML = "✅ " + currentOptions[idx];
        score += 2; 
        document.getElementById('score').innerText = score;
        feedback.style.background = '#e8f5e9';
        feedback.style.color = '#2e7d32';
        feedback.style.borderLeft = '6px solid var(--success)';
        try { audioCorrect.play(); } catch(e) {} // تشغيل صوت التصفيق والنجاح للإجابة الصحيحة
    } else {
        btn.classList.add('wrong');
        btn.innerHTML = "❌ " + currentOptions[idx];
        buttons[correctAnswerIndex].classList.add('correct');
        buttons[correctAnswerIndex].innerHTML = "✅ " + currentOptions[correctAnswerIndex];
        feedback.style.background = '#ffebee';
        feedback.style.color = '#c62828';
        feedback.style.borderLeft = '6px solid var(--error)';
        try { audioWrong.play(); } catch(e) {} // تشغيل صوت التنبيه الهادئ للإجابة الخاطئة
    }
    document.getElementById('nextBtn').style.display = 'block';
}

function loadNextQuestion() {
    currentQ++;
    if(currentQ < 50) {
        loadQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    clearInterval(timer);
    document.getElementById('quizBody').style.display = 'none';
    document.getElementById('nextBtn').style.display = 'none';
    document.querySelector('.stats-bar').style.display = 'none';
    document.getElementById('resultPage').style.display = 'block';
    document.getElementById('finalScore').innerText = score + "%";
    try { audioFinal.play(); } catch(e) {} // صوت النجاح الكلي للمشروع عند النهاية
}

loadQuestion();
</script>
